<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Instana SDK Lab</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="shell">
    <aside class="sidebar">
        <div class="brand">
            <span class="brand-mark">IS</span>
            <div>
                <h1>訂單營運中心</h1>
                <p>Instana SDK Lab</p>
            </div>
        </div>
        <nav>
            <button class="nav-item active" type="button">訂單作業</button>
            <button class="nav-item" type="button">出貨管理</button>
            <button class="nav-item" type="button">風險審核</button>
            <button class="nav-item" type="button">稽核紀錄</button>
        </nav>
        <div class="runtime">
            <span>執行環境</span>
            <strong>JBoss 8 · Java 17</strong>
        </div>
    </aside>

    <section class="workspace">
        <header class="topbar">
            <div>
                <h2>訂單指揮台</h2>
                <p>執行真實感的訂單操作，觀察 HTTP、JDBC、錯誤與 Instana trace 資訊。</p>
            </div>
            <div class="status" id="health">檢查中</div>
        </header>

        <section class="summary">
            <div>
                <span>HTTP</span>
                <strong id="httpStatus">-</strong>
            </div>
            <div>
                <span>耗時</span>
                <strong id="elapsed">-</strong>
            </div>
            <div>
                <span>JDBC</span>
                <strong id="query">-</strong>
            </div>
            <div>
                <span>追蹤</span>
                <strong id="trace">-</strong>
            </div>
        </section>

        <section class="content-grid">
            <div class="panel operations">
                <div class="panel-heading">
                    <h3>請求操作台</h3>
                    <span id="methodBadge">GET</span>
                </div>

                <form id="traceForm">
                    <div class="field-grid">
                        <label>
                            訂單編號
                            <input id="orderId" value="ORD-1001" autocomplete="off">
                        </label>
                        <label>
                            客戶編號
                            <input id="customerId" value="CUST-88" autocomplete="off">
                        </label>
                        <label>
                            模擬情境
                            <select id="scenario">
                                <option value="normal">normal</option>
                                <option value="slow-query">slow-query</option>
                                <option value="bad-query">bad-query</option>
                                <option value="slow-method">slow-method</option>
                                <option value="business-error">business-error</option>
                                <option value="system-error">system-error</option>
                                <option value="random-error">random-error</option>
                            </select>
                        </label>
                    </div>

                    <div class="operation-list">
                        <button class="operation active" type="button" data-method="GET" data-operation="retrieve-workspace" data-path="workspace" data-label="查詢訂單工作區">
                            <span>GET</span>
                            <strong>查詢訂單工作區</strong>
                        </button>
                        <button class="operation" type="button" data-method="POST" data-operation="submit-order" data-path="submission" data-label="送出新訂單">
                            <span>POST</span>
                            <strong>送出新訂單</strong>
                        </button>
                        <button class="operation" type="button" data-method="PUT" data-operation="approve-order" data-path="approval" data-label="核准出貨">
                            <span>PUT</span>
                            <strong>核准出貨</strong>
                        </button>
                        <button class="operation" type="button" data-method="DELETE" data-operation="cancel-order" data-path="cancellation" data-label="取消訂單">
                            <span>DELETE</span>
                            <strong>取消訂單</strong>
                        </button>
                    </div>

                    <button id="runButton" class="primary-action" type="submit">執行請求</button>
                </form>
            </div>

            <div class="panel queue">
                <div class="panel-heading">
                    <h3>即時訂單佇列</h3>
                    <span>模擬資料</span>
                </div>
                <table>
                    <thead>
                    <tr>
                        <th>訂單</th>
                        <th>客戶</th>
                        <th>狀態</th>
                        <th>風險</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr data-order="ORD-1001" data-customer="CUST-88">
                        <td>ORD-1001</td>
                        <td>CUST-88</td>
                        <td><span class="pill paid">已付款</span></td>
                        <td>低</td>
                    </tr>
                    <tr data-order="ORD-1002" data-customer="CUST-99">
                        <td>ORD-1002</td>
                        <td>CUST-99</td>
                        <td><span class="pill pending">待審核</span></td>
                        <td>需覆核</td>
                    </tr>
                    <tr data-order="ORD-1003" data-customer="CUST-77">
                        <td>ORD-1003</td>
                        <td>CUST-77</td>
                        <td><span class="pill paid">已付款</span></td>
                        <td>低</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section class="panel response-panel">
            <div class="panel-heading">
                <h3>回應內容</h3>
                <span id="lastRequest">尚未執行請求</span>
            </div>
            <pre id="output">{}</pre>
        </section>
    </section>
</main>
<script src="app.js"></script>
</body>
</html>
